name: Build iOS (device)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-ios-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Xcode build for iPhone (unsigned)
    runs-on: macos-15
    env:
      DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData
      DIST_DIR: ${{ github.workspace }}/dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3 (fallback to image default)
        run: |
          set -e
          if [ -d "/Applications/Xcode_26.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Build for iOS device (compile only, no codesign)
        run: |
          set -eo pipefail
          xcodebuild \
            -project PlaneLaunchTycoon.xcodeproj \
            -scheme PlaneLaunchTycoon \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package Payload (.app → zip → .ipa)
        run: |
          set -eo pipefail
          APP_SRC="$DERIVED_DATA_PATH/Build/Products/Debug-iphoneos/PlaneLaunchTycoon.app"
          test -d "$APP_SRC"

          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR/Payload"
          cp -R "$APP_SRC" "$DIST_DIR/Payload/"

          cd "$DIST_DIR"
          rm -f PlaneLaunchTycoon.zip PlaneLaunchTycoon.ipa
          zip -r -y PlaneLaunchTycoon.zip Payload
          cp PlaneLaunchTycoon.zip PlaneLaunchTycoon.ipa

          echo "Payload layout (unsigned device build; not for App Store install):"
          ls -la PlaneLaunchTycoon.zip PlaneLaunchTycoon.ipa
          unzip -l PlaneLaunchTycoon.zip | head -40

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PlaneLaunchTycoon-ios-${{ github.sha }}
          path: |
            dist/PlaneLaunchTycoon.zip
            dist/PlaneLaunchTycoon.ipa
          if-no-files-found: error
